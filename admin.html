<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISCR | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <!-- Security Gateway (Google Auth) -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="shield-check" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Admin Secured</h2>
            <p class="text-slate-500 mb-6 text-sm">Please sign in with your authorized Google account to access the dashboard.</p>
            <button id="google-login-btn" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 text-slate-700 px-4 py-3 rounded-lg font-semibold hover:bg-slate-50 transition-colors shadow-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- Main Dashboard (Hidden by default) -->
    <div id="admin-dashboard" class="hidden min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <i data-lucide="wrench" class="w-6 h-6 text-blue-600"></i>
                    <h1 class="text-xl font-bold text-slate-800">ISCR Command Center</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 text-sm text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        Live Cloud Sync
                    </div>
                    <button id="logout-btn" class="text-sm font-medium text-slate-500 hover:text-red-600 transition-colors flex items-center gap-2">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
                    </button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-slate-800">Active Repair Tickets</h2>
                <p class="text-slate-500">Manage incoming requests securely from your live website.</p>
            </div>
            
            <!-- Tickets Grid -->
            <div id="tickets-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading state -->
                <div class="col-span-full py-12 text-center text-slate-400">
                    <i data-lucide="loader-2" class="w-8 h-8 mx-auto animate-spin mb-3"></i>
                    <p>Connecting to secure database...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        lucide.createIcons();

        // ==========================================
        // 1. FIREBASE CONFIGURATION
        // ==========================================
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyBpSZLqUCuDAfprNDJW12unU0eOtKDgNYE",
            authDomain: "island-side-repair.firebaseapp.com",
            projectId: "island-side-repair",
            storageBucket: "island-side-repair.firebasestorage.app",
            messagingSenderId: "194705219894",
            appId: "1:194705219894:web:bb04405112f0a535045397",
            measurementId: "G-BTRGS3TN0C"
        };

        const app = initializeApp(FIREBASE_CONFIG);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ==========================================
        // 2. SECURITY & AUTHENTICATION
        // ==========================================
        const loginOverlay = document.getElementById('login-overlay');
        const dashboard = document.getElementById('admin-dashboard');
        const googleLoginBtn = document.getElementById('google-login-btn');
        const logoutBtn = document.getElementById('logout-btn');

        let unsubscribeDb = null;

        // Listen for Auth State Changes
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is logged in! Hide lock, show dashboard
                loginOverlay.classList.add('hidden');
                dashboard.classList.remove('hidden');
                
                // Securely fetch the data
                initLiveDatabase();
            } else {
                // Not logged in. Show lock, hide dashboard
                loginOverlay.classList.remove('hidden');
                dashboard.classList.add('hidden');
                
                // Stop listening to database if logged out to prevent permission errors
                if(unsubscribeDb) unsubscribeDb();
            }
        });

        // Login Action
        googleLoginBtn.addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login failed:", error);
                alert("Login failed: " + error.message);
            }
        });

        // Logout Action
        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        // ==========================================
        // 3. DATABASE LOGIC (Cloud)
        // ==========================================
        function initLiveDatabase() {
            // Listen to the main tickets database
            const q = query(collection(db, "tickets"));
            
            unsubscribeDb = onSnapshot(q, (snapshot) => {
                const ticketsList = document.getElementById('tickets-list');
                ticketsList.innerHTML = ''; 
                
                if (snapshot.empty) {
                    ticketsList.innerHTML = `
                        <div class="col-span-full py-12 text-center text-slate-500">
                            <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-3 opacity-50"></i>
                            <p>No active repair tickets found.</p>
                        </div>
                    `;
                    lucide.createIcons();
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const ticket = docSnap.data();
                    renderTicket(ticket, docSnap.id);
                });
                
                lucide.createIcons();
            }, (error) => {
                console.error("Firestore error:", error);
                if(error.code === 'permission-denied') {
                    alert("Permission Denied: Your Google account is not authorized in the Firebase Security Rules. Please sign in with the correct email.");
                    signOut(auth);
                }
            });
        }

        // ==========================================
        // 4. UI RENDERER
        // ==========================================
        function renderTicket(ticket, id) {
            const ticketsList = document.getElementById('tickets-list');
            const date = ticket.timestamp ? new Date(ticket.timestamp).toLocaleString() : 'Just now';
            
            let badgeClass = 'bg-blue-100 text-blue-700';
            let statusText = ticket.status || 'New';
            let nextAction = 'Start Work';
            
            if (statusText === 'In Progress') {
                badgeClass = 'bg-amber-100 text-amber-700';
                nextAction = 'Mark Completed';
            } else if (statusText === 'Completed') {
                badgeClass = 'bg-green-100 text-green-700';
                nextAction = 'Re-open Ticket';
            }

            const card = document.createElement('div');
            card.className = 'bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col transition-all hover:shadow-md';
            card.innerHTML = `
                <div class="p-5 flex-grow">
                    <div class="flex justify-between items-start mb-4">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${badgeClass}">
                            ${statusText}
                        </span>
                        <span class="text-xs text-slate-400 flex items-center gap-1">
                            <i data-lucide="clock" class="w-3 h-3"></i> ${date}
                        </span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 mb-1">${ticket.name || 'Unknown Client'}</h3>
                    <div class="space-y-2 mt-4 text-sm">
                        <a href="tel:${ticket.phone}" class="flex items-center gap-2 text-slate-600 hover:text-blue-600">
                            <i data-lucide="phone" class="w-4 h-4"></i> ${ticket.phone || 'No phone provided'}
                        </a>
                        ${ticket.email ? `
                        <a href="mailto:${ticket.email}" class="flex items-center gap-2 text-slate-600 hover:text-blue-600">
                            <i data-lucide="mail" class="w-4 h-4"></i> ${ticket.email}
                        </a>` : ''}
                        ${ticket.device ? `
                        <div class="flex items-center gap-2 text-slate-600">
                            <i data-lucide="laptop" class="w-4 h-4"></i> ${ticket.device}
                        </div>` : ''}
                    </div>
                    <div class="mt-4 p-3 bg-slate-50 rounded-lg text-sm text-slate-700 border border-slate-100">
                        <strong>Issue:</strong> ${ticket.issue || 'No details provided.'}
                    </div>
                </div>
                <div class="bg-slate-50 px-5 py-3 border-t border-slate-200 flex justify-between items-center">
                    <button onclick="updateTicketStatus('${id}', '${statusText}')" class="text-sm font-medium text-blue-600 hover:text-blue-700 flex items-center gap-1">
                        <i data-lucide="check-circle-2" class="w-4 h-4"></i> ${nextAction}
                    </button>
                    <button onclick="deleteTicket('${id}')" class="text-sm font-medium text-red-500 hover:text-red-700 flex items-center gap-1">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> Delete
                    </button>
                </div>
            `;
            ticketsList.appendChild(card);
        }

        // Expose to window for inline onclick handlers
        window.updateTicketStatus = async function(id, currentStatus) {
            let nextStatus = 'In Progress';
            if (currentStatus === 'In Progress') nextStatus = 'Completed';
            if (currentStatus === 'Completed') nextStatus = 'New';
            
            try {
                await updateDoc(doc(db, "tickets", id), { status: nextStatus });
            } catch(e) {
                console.error("Error updating ticket:", e);
                alert("Error updating ticket. You might not have permissions.");
            }
        };

        window.deleteTicket = async function(id) {
            if(confirm("Are you sure you want to delete this ticket permanently?")) {
                try {
                    await deleteDoc(doc(db, "tickets", id));
                } catch(e) {
                    console.error("Error deleting ticket:", e);
                    alert("Error deleting ticket. You might not have permissions.");
                }
            }
        };
    </script>
</body>
</html>
